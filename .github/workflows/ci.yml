# @file ci.yml
# @version 0.2.0
# @description Quality gate otomatis untuk pull request dan main.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Workflow ini menjalankan quality gate level aplikasi (format, lint,
# type-check, unit test, build), lalu dua job lanjutan yang berjalan paralel
# setelah job `quality` lulus: Playwright E2E dan pengujian database
# (RLS/pgTAP lewat `npm run db:test`, lihat Document/MVP/08-Engineering-
# Foundation.md). CLI Supabase tersedia lewat devDependency `supabase` di
# package.json (bin ter-link otomatis oleh `npm ci`), dan runner GitHub-hosted
# sudah menyediakan Docker, sehingga job database tidak perlu setup CLI
# terpisah — cukup `npm ci` seperti job lain.
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit test
        run: npm run test:run

      - name: Build
        run: npm run build

  # `needs: quality` membuat job E2E menunggu job quality lulus lebih dulu,
  # sehingga instalasi browser Playwright (langkah paling lambat) tidak
  # dijalankan sia-sia ketika lint/type-check/unit test/build sudah gagal.
  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright
        run: npm run test:e2e

  # Job terpisah dari `e2e` (keduanya `needs: quality`, berjalan paralel)
  # karena keduanya independen dan sama-sama lambat (start Supabase vs
  # install browser) — menjalankan serial hanya akan memperlama CI tanpa
  # manfaat, sebab job database tidak bergantung pada hasil E2E atau
  # sebaliknya.
  database:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local stack
        run: npm run supabase:start

      - name: Reset database (apply migrations + seed resmi)
        run: npm run db:reset

      - name: Lint schema database
        run: npm run db:lint

      - name: pgTAP — RLS dan integrasi transaksi
        run: npm run db:test

      # `if: always()` memastikan container Supabase tetap dihentikan walau
      # salah satu langkah di atas gagal, agar runner tidak menyisakan proses
      # Docker menggantung.
      - name: Stop Supabase local stack
        if: always()
        run: npm run supabase:stop
